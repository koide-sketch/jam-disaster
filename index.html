<!DOCTYPE html>
<html lang="ja">

<head>

    <link rel="stylesheet" href="style.css">
    <title>JAM 災害時営業状況</title>
</head>

<body>

    <div class="container">

        <h1>JAMミュージックスクール</h1>

        <h2>災害時営業状況</h2>

        <div class="status-card">

            <h3>現在の営業状態</h3>

            <div id="status-title" class="status normal">

            <p id="updated-at" class="update">

        </div>

        <div class="card">

            <h3>ご案内</h3>

            <p id="status-message">
                本日は通常どおり営業しております。
            </p>

        </div>

        <div class="card">

            <h3>お問い合わせ</h3>

            <p>
                JAMミュージックスクール
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</html>
