<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>営業状態 管理画面</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>管理画面</h1>
        <h2>営業状態を変更</h2>

        <div class="card">
            <button onclick="updateStatus('normal')">通常営業</button>
            <button onclick="updateStatus('partial')">一部休講</button>
            <button onclick="updateStatus('closed')">休校</button>
        </div>

        <div class="status-card">
            <h3>現在の営業状態</h3>

            <div id="status-title" class="status normal">
                読み込み中...
            </div>

            <p id="updated-at" class="update">
                更新日時：
            </p>
        </div>

        <div class="card">
            <h3>ご案内</h3>

            <p id="status-message">
                営業状況を読み込んでいます。
            </p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

</body>

</html>
